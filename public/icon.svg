<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Modern gradient for the app launcher tile background -->
    <linearGradient id="icon-bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <!-- Soft glow filter for the logo elements -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background tile with a sleek, rounded-squircle finish -->
  <rect width="512" height="512" rx="112" fill="url(#icon-bg-gradient)" />
  
  <!-- Subtle inner border for premium lighting depth -->
  <rect x="8" y="8" width="496" height="496" rx="104" fill="none" stroke="#2563eb" stroke-width="4" opacity="0.4" />

  <!-- Centered and scaled EnoTech Academy Brand Icon (Academic Cap & Books stack) -->
  <g transform="translate(86, 86) scale(5.3)" filter="url(#glow)">
    <!-- Stack of Books (base) -->
    <path d="M12 40C12 36.6863 14.6863 34 18 34H48V46H18C14.6863 46 12 43.3137 12 40Z" fill="#1e40af" stroke="#60a5fa" stroke-width="1.5" />
    <path d="M14 44C14 41.2386 16.2386 39 19 39H46V49H19C16.2386 49 14 46.7614 14 44Z" fill="#2563eb" stroke="#3b82f6" stroke-width="1.5" />
    <path d="M16 48C16 45.7909 17.7909 44 20 44H44V52H20C17.7909 52 16 50.2091 16 48Z" fill="#3b82f6" stroke="#93c5fd" stroke-width="1.5" />
    
    <!-- Floating Graduation Cap (top) -->
    <path d="M10 24L32 14L54 24L32 34L10 24Z" fill="#1e293b" stroke="#f97316" stroke-width="2" stroke-linejoin="round" />
    <path d="M20 28.5V36C20 36 24 40 32 40C40 40 44 36 44 36V28.5" stroke="#f97316" stroke-width="2" stroke-linecap="round" />
    <path d="M48 24.5V33.5C48 33.5 49 35 46.5 35" stroke="#f97316" stroke-width="1.5" stroke-linecap="round" />
    <circle cx="46.5" cy="35" r="1.5" fill="#f97316" />
  </g>
</svg>
